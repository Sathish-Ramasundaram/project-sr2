version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: sr_postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: sr_store
    ports:
      - '5433:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data

  hasura:
    image: hasura/graphql-engine:v2.44.0
    container_name: sr_hasura
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      - postgres
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://postgres:postgres@postgres:5432/sr_store
      HASURA_GRAPHQL_ENABLE_CONSOLE: 'true'
      HASURA_GRAPHQL_DEV_MODE: 'true'
      HASURA_GRAPHQL_ADMIN_SECRET: admin123
      HASURA_GRAPHQL_JWT_SECRET: '{"type":"HS256","key":"change-this-to-a-very-strong-secret","claims_namespace":"https://hasura.io/jwt/claims"}'

  temporal:
    image: temporalio/auto-setup:1.28.1
    container_name: sr_temporal
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PWD: postgres
      POSTGRES_SEEDS: postgres
    ports:
      - '7233:7233'

  temporal-ui:
    image: temporalio/ui:2.39.0
    container_name: sr_temporal_ui
    restart: unless-stopped
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - '8088:8080'
      
volumes:
  pg_data:
    external: true
    name: hasura_pg_data
